services:
  api:
    container_name: travel-hub-api
    build:
      context: .
    ports:
      - "3000:3000"
    environment:
      - MONGO_URL=mongodb://mongo:27017
      - REDIS_URL=redis://redis:6379
    volumes:
      - .:/usr/src/app:cached
      - /usr/src/app/node_modules
    depends_on:
      - mongo
      - redis

  log-server:
    build:
      context: .
      dockerfile: Dockerfile
    command: npm run dev:logs
    ports:
      - "4000:4000"
    environment:
      - REDIS_URL=redis://redis:6379
    volumes:
      - .:/usr/src/app:cached
      - /usr/src/app/node_modules
    depends_on:
      - redis

  frontend:
    image: node:20
    working_dir: /app
    volumes:
      - ./src/frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npx vite --host"
    depends_on:
      - api

  mongo:
    image: mongo
    ports:
      - "27017:27017"

  redis:
    image: redis
    ports:
      - "6379:6379"

  redisinsight:
    image: redis/redisinsight:latest
    container_name: redisinsight
    environment:
      - RI_REDIS_HOST=redis
      - RI_REDIS_PORT=6379
      - RI_REDIS_ALIAS=travel-hub
    ports:
      - "5540:5540"
    depends_on:
      - redis

