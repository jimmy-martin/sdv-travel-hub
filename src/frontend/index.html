<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Travel Hub UI</title>
</head>
<body>
  <h1>🌍 Offres disponibles</h1>

  <form id="filter-form">
    <input type="text" name="from" placeholder="From" value="PAR" />
    <input type="text" name="to" placeholder="To" value="TYO" />
    <input type="number" name="limit" value="5" />
    <input type="text" name="q" placeholder="Search term" />
    <button type="submit">Filtrer</button>
  </form>

  <div id="offers" style="margin-top: 1rem;"></div>

  <h2>➕ Créer une offre</h2>
  <form id="create-form">
    <input type="text" name="from" placeholder="From" required />
    <input type="text" name="to" placeholder="To" required />
    <input type="text" name="provider" placeholder="Provider" required />
    <input type="number" name="price" placeholder="Price" required />
    <button type="submit">Créer</button>
  </form>

  <h2>🧾 Logs Redis</h2>
  <pre id="logs" style="background:#f4f4f4; padding:1rem;"></pre>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
